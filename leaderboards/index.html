<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Agee Arcade leaderboards. Choose a game and view the top scores.">
    <title>Leaderboards - Agee Arcade</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="../css/main.css">
</head>
<body>

    <header class="site-header">
        <a class="logo" href="../">AGEE ARCADE</a>
        <nav class="site-nav">
            <span>Created By Jeremie Agee</span>
            <a href="./" style="color:var(--text-primary);">Leaderboards</a>
            <a href="../about/">About</a>
        </nav>
    </header>

    <main>
        <section class="leaderboards-hero container">
            <p class="hero__eyebrow">Top scores</p>
            <h1 class="leaderboards-title">Leaderboards</h1>
            <p class="leaderboards-subtitle">Choose a game to view its current leaderboard.</p>
        </section>

        <section class="leaderboards-section container">
            <div class="leaderboards-toolbar">
                <label class="leaderboards-label" for="leaderboardGameSelect">Game</label>
                <select id="leaderboardGameSelect" class="leaderboards-select"></select>
            </div>

            <div class="leaderboards-panel">
                <div class="leaderboards-panel-head">
                    <div>
                        <p id="leaderboardGameGenre" class="leaderboards-kicker"></p>
                        <h2 id="leaderboardGameTitle">Select a Game</h2>
                    </div>
                    <a id="leaderboardGameLink" class="btn-secondary leaderboards-play-link" href="../games/depths-of-ashenveil/">Open Game</a>
                </div>

                <div class="leaderboards-table-wrap">
                    <table class="leaderboards-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Nickname</th>
                                <th>Highest Level</th>
                                <th>Floor</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardRows"></tbody>
                    </table>
                    <p id="leaderboardEmpty" class="leaderboards-empty">Select a game to load scores.</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; <span id="footer-year"></span> Created By Jeremie Agee. All rights reserved.</p>
    </footer>

    <!-- Fixed bottom ad banner -->
    <div class="ad-bottom-strip">
        <!-- ADSENSE SLOT: leaderboardsBottomBanner — replace with <ins> tag when ready -->
        <span class="ad-placeholder">Advertisement</span>
    </div>

    <script src="../js/games.js"></script>
    <script src="../games/depths-of-ashenveil/js/config/supabase-config.js"></script>
    <script src="../games/depths-of-ashenveil/js/systems/save.js"></script>
    <script src="../js/leaderboards.js"></script>
</body>
</html>
