<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Agee Arcade leaderboards. Choose a game and view the top scores.">
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src  'self' 'unsafe-inline'
                  https://cdnjs.cloudflare.com
                  https://cdn.jsdelivr.net
                  https://pagead2.googlesyndication.com
                  https://ep2.adtrafficquality.google;
      style-src   'self' 'unsafe-inline'
                  https://fonts.googleapis.com;
      font-src    'self'
                  https://fonts.gstatic.com;
      connect-src 'self'
                  https://xdvrgeaivfqpcsmuqeyi.supabase.co
                  wss://xdvrgeaivfqpcsmuqeyi.supabase.co
                  https://pagead2.googlesyndication.com
                  https://googleads.g.doubleclick.net
                  https://ep1.adtrafficquality.google;
      img-src     'self' data: blob:
                  https://www.googletagmanager.com
                  https://pagead2.googlesyndication.com
                  https://googleads.g.doubleclick.net;
      frame-src   https://googleads.g.doubleclick.net;
      object-src  'none';
      base-uri    'self';
      form-action 'self';
    ">
    <title>Leaderboards - Agee Arcade</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="../css/main.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9709866738532619"
         crossorigin="anonymous"></script>
</head>
<body>

    <header class="site-header">
        <a class="logo" href="../">AGEE ARCADE</a>
        <nav class="site-nav">
            <span>Created By Jeremie Agee</span>
            <a href="./" style="color:var(--text-primary);">Leaderboards</a>
            <a href="../about/">About</a>
        </nav>
    </header>

    <main>
        <section class="leaderboards-hero container">
            <p class="hero__eyebrow">Top scores</p>
            <h1 class="leaderboards-title">Leaderboards</h1>
            <p class="leaderboards-subtitle">Choose a game to view its current leaderboard.</p>
        </section>

        <section class="leaderboards-section container">
            <div class="leaderboards-toolbar">
                <label class="leaderboards-label" for="leaderboardGameSelect">Game</label>
                <select id="leaderboardGameSelect" class="leaderboards-select"></select>
            </div>

            <div class="leaderboards-panel">
                <div class="leaderboards-panel-head">
                    <div>
                        <p id="leaderboardGameGenre" class="leaderboards-kicker"></p>
                        <h2 id="leaderboardGameTitle">Select a Game</h2>
                    </div>
                    <a id="leaderboardGameLink" class="btn-secondary leaderboards-play-link" href="../games/depths-of-ashenveil/">Open Game</a>
                </div>

                <div class="leaderboards-table-wrap">
                    <table class="leaderboards-table">
                        <thead>
                            <tr id="leaderboardHead">
                                <th>Rank</th>
                                <th>Nickname</th>
                                <th>Score</th>
                                <th>Detail</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardRows"></tbody>
                    </table>
                    <p id="leaderboardEmpty" class="leaderboards-empty">Select a game to load scores.</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; <span id="footer-year"></span> Created By Jeremie Agee. All rights reserved.</p>
    </footer>

    <!-- Fixed bottom ad banner -->
    <div class="ad-bottom-strip">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-9709866738532619"
             data-ad-slot="7421345542"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
            window.addEventListener('load', function () {
                var slot = document.querySelector('.ad-bottom-strip .adsbygoogle');
                if (!slot || slot.offsetWidth <= 0) return;
                (adsbygoogle = window.adsbygoogle || []).push({});
            });
        </script>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('footer-year').textContent = new Date().getFullYear();
      });
    </script>
    <script src="../js/games.js"></script>
    <script src="../js/leaderboards.js"></script>
    <script src="../js/analytics.js"></script>
    <script>if (window.AgeeAnalytics) window.AgeeAnalytics.trackEvent('leaderboard_opened');</script>
</body>
</html>
