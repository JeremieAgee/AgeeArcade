<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Maze Runner leaderboard — top scores from Agee Arcade's endless procedural maze game." />
  <title>Maze Runner Leaderboard — Agee Arcade</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #05050c; --surface: #0e0e1c; --surface2: #161628;
      --accent: #4488ff; --accent2: #00ff88; --gold: #ffbb00;
      --text: #dde4ff; --text-dim: #7788aa; --border: #1e2040;
      --font-head: 'Orbitron', monospace; --font-body: 'Inter', sans-serif;
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; min-height: 100vh; }

    .lb-shell {
      width: 100%; max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 32px;
      box-shadow: 0 0 60px rgba(68,136,255,0.1);
    }

    .lb-kicker { font-family: var(--font-head); font-size: 9px; letter-spacing: 4px; color: var(--text-dim); margin-bottom: 6px; }
    h1 { font-family: var(--font-head); font-size: clamp(22px, 5vw, 34px); font-weight: 900; letter-spacing: 4px;
         background: linear-gradient(135deg, #55aaff, #00ff99); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .lb-sub { font-size: 12px; color: var(--text-dim); margin: 8px 0 24px; }

    .lb-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
    .lb-btn {
      font-family: var(--font-head); font-size: 10px; letter-spacing: 2px;
      padding: 10px 20px; border-radius: 6px; text-decoration: none; cursor: pointer;
      transition: opacity 0.2s;
    }
    .lb-btn:hover { opacity: 0.85; }
    .lb-btn.primary { background: linear-gradient(135deg, #2255cc, #4488ff); color: #fff; border: none; }
    .lb-btn.ghost   { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-family: var(--font-head); font-size: 9px; letter-spacing: 2px;
      color: var(--text-dim); padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left;
    }
    tbody tr { border-bottom: 1px solid #111122; }
    tbody tr:hover { background: #111125; }
    tbody td { padding: 10px 12px; font-size: 13px; }
    tbody tr:nth-child(1) td { color: var(--gold); font-family: var(--font-head); }
    tbody tr:nth-child(2) td { color: #aabbcc; }
    tbody tr:nth-child(3) td { color: #cc8844; }
    .td-rank { font-family: var(--font-head); font-size: 11px; color: var(--text-dim); }
    .td-name { font-size: 10px; color: var(--text-dim); }
    .td-score { font-family: var(--font-head); }
    #lbEmpty { text-align: center; padding: 24px; color: var(--text-dim); font-size: 12px; }
    .lb-footer { margin-top: 24px; text-align: center; }
    .lb-footer a { font-size: 11px; color: var(--text-dim); text-decoration: none; font-family: var(--font-head); letter-spacing: 1px; }
    .lb-footer a:hover { color: var(--text); }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9709866738532619" crossorigin="anonymous"></script>
</head>
<body>
  <div class="lb-shell">
    <div class="lb-kicker">AGEE ARCADE</div>
    <h1>MAZE RUNNER</h1>
    <p class="lb-sub">Top scores — deepest floors, highest points</p>

    <div class="lb-actions">
      <a href="../" class="lb-btn primary">▶ PLAY NOW</a>
      <a href="../../" class="lb-btn ghost">← ARCADE</a>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Player</th>
          <th>Score</th>
          <th>Floor</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="lbBody">
        <tr><td colspan="5" id="lbEmpty">Loading scores…</td></tr>
      </tbody>
    </table>

    <div class="lb-footer">
      <a href="../../../">← Back to all games</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    (async function () {
      const URL  = 'https://xdvrgeaivfqpcsmuqeyi.supabase.co';
      const KEY  = 'sb_publishable_1UoSYMFfHQerkvlvHvbpRQ_JGIYH14O';
      const body = document.getElementById('lbBody');

      function fmtTime(ms) {
        const s = Math.floor(ms / 1000);
        const m = Math.floor(s / 60).toString().padStart(2, '0');
        return m + ':' + (s % 60).toString().padStart(2, '0');
      }

      try {
        const client = window.supabase.createClient(URL, KEY);
        const { data, error } = await client
          .from('maze_runner_runs')
          .select('user_id, floors, score, time_ms')
          .order('score', { ascending: false })
          .limit(20);

        if (error) throw error;

        if (!data || data.length === 0) {
          body.innerHTML = '<tr><td colspan="5" id="lbEmpty">No scores yet — play and be first!</td></tr>';
          return;
        }

        body.innerHTML = data.map((row, i) => `
          <tr>
            <td class="td-rank">${i + 1}</td>
            <td class="td-name">${row.user_id.slice(0, 8)}…</td>
            <td class="td-score">${row.score.toLocaleString()}</td>
            <td>Floor ${row.floors}</td>
            <td style="color:#7788aa;font-size:11px">${fmtTime(row.time_ms)}</td>
          </tr>
        `).join('');
      } catch (e) {
        body.innerHTML = '<tr><td colspan="5" id="lbEmpty" style="color:#f44">Could not load scores. Try again later.</td></tr>';
      }
    })();
  </script>
</body>
</html>
