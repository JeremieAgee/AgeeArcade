<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Agee Hoops Leaderboard — Top basketball shooters on Agee Arcade" />
  <title>Agee Hoops Leaderboard — Agee Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #fff; }

    .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
    h1 { font-family: 'Cinzel', serif; color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.6); margin-bottom: 2rem; text-align: center; }

    .leaderboard { background: rgba(20,16,40,0.8); border: 2px solid rgba(255,215,0,0.4); border-radius: 8px; overflow: hidden; }
    .leaderboard-header { display: grid; grid-template-columns: 80px 1fr 120px 150px; gap: 1rem; padding: 1rem; background: rgba(255,215,0,0.1); border-bottom: 1px solid rgba(255,215,0,0.3); font-weight: 700; color: rgba(255,215,0,0.8); }
    .leaderboard-row { display: grid; grid-template-columns: 80px 1fr 120px 150px; gap: 1rem; padding: 1rem; border-bottom: 1px solid rgba(255,215,0,0.1); align-items: center; }
    .leaderboard-row:hover { background: rgba(255,215,0,0.05); }

    .rank { font-weight: 700; color: #ffd700; }
    .rank-1 { color: #ffd700; }
    .rank-2 { color: #c0c0c0; }
    .rank-3 { color: #cd7f32; }

    .name { color: rgba(255,255,255,0.9); }
    .score { text-align: right; font-family: 'Courier New', monospace; color: #00ff88; font-weight: 700; }
    .date { text-align: right; font-size: 0.85rem; color: rgba(255,215,0,0.6); }

    .loading { text-align: center; padding: 3rem; color: rgba(255,215,0,0.6); }
    .error { color: #ff6b6b; text-align: center; padding: 2rem; }

    .back-link { display: inline-block; margin-top: 2rem; padding: 0.75rem 1.5rem; background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.4); color: #ffd700; text-decoration: none; border-radius: 4px; transition: all 0.3s; }
    .back-link:hover { background: rgba(255,215,0,0.25); }
  </style>
</head>
<body>
  <div class="container">
    <h1>AGEE HOOPS LEADERBOARD</h1>

    <div id="leaderboard" class="leaderboard">
      <div class="leaderboard-header">
        <div style="text-align: center;">RANK</div>
        <div>PLAYER</div>
        <div style="text-align: right;">SCORE</div>
        <div style="text-align: right;">DATE</div>
      </div>
      <div id="leaderboardBody"></div>
    </div>

    <div id="loading" class="loading" style="display: none;">Loading leaderboard...</div>
    <div id="error" class="error" style="display: none;"></div>

    <a href="../../" class="back-link">← BACK TO ARCADE</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
  <script src="../../../js/leaderboard-utils.js" defer></script>
  <script defer>
    const GAME_ID = 'agee_hoops';

    async function loadLeaderboard() {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const body = document.getElementById('leaderboardBody');

      try {
        loading.style.display = 'block';

        if (!window.LeaderboardUtils) {
          throw new Error('LeaderboardUtils not loaded');
        }

        const scores = await window.LeaderboardUtils.getTopScores(GAME_ID, 100);

        if (!scores || scores.length === 0) {
          body.innerHTML = '<div class="leaderboard-row" style="grid-column: 1 / -1; text-align: center; color: rgba(255,215,0,0.6);">No scores yet. Be the first!</div>';
          loading.style.display = 'none';
          return;
        }

        let html = '';
        scores.forEach((score, index) => {
          const rank = index + 1;
          const rankClass = rank <= 3 ? `rank-${rank}` : '';
          const date = new Date(score.created_at).toLocaleDateString();

          html += `
            <div class="leaderboard-row">
              <div class="rank ${rankClass}" style="text-align: center;">#${rank}</div>
              <div class="name">${score.player_name || 'Anonymous'}</div>
              <div class="score">${score.score}</div>
              <div class="date">${date}</div>
            </div>
          `;
        });

        body.innerHTML = html;
        loading.style.display = 'none';

      } catch (err) {
        console.error('Failed to load leaderboard:', err);
        error.style.display = 'block';
        error.textContent = `Error loading leaderboard: ${err.message}`;
        loading.style.display = 'none';
      }
    }

    document.addEventListener('DOMContentLoaded', loadLeaderboard);
  </script>
</body>
</html>
